name: Build NPCs.json from NPCs.xlsx

on:
  push:
    paths:
      - "NPCs.xlsx"
      - "tools/xlsx_to_json.py"
      - ".github/workflows/build-json.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Generate NPCs.json
        run: |
          python tools/xlsx_to_json.py

      - name: Commit NPCs.json if changed
        run: |
          if [ ! -f NPCs.json ]; then
            echo "NPCs.json was not generated!"
            exit 1
          fi

          git add -f NPCs.json

          if git diff --cached --quiet; then
            echo "NPCs.json unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Auto-generate NPCs.json from NPCs.xlsx"
          git push