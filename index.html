<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NPC Viewer</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .thumb {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: .5rem;
      background: #f1f3f5;
      border: 1px solid rgba(0,0,0,.1);
      flex: 0 0 auto;
    }
    .thumb.missing {
      display: grid;
      place-items: center;
      font-size: 10px;
      color: #6c757d;
    }
    .npc-row { cursor: pointer; }
    .npc-name { font-weight: 700; }
    .npc-meta { font-size: .85rem; color: #6c757d; }
    .modal-img {
      width: 100%;
      height: auto;
      border-radius: 1rem;
      border: 1px solid rgba(0,0,0,.1);
      background: #f1f3f5;
    }
    .kv .k { color: #6c757d; }
    .kv .v { font-weight: 500; }
    .kv .row { padding-top: .25rem; padding-bottom: .25rem; border-bottom: 1px dashed rgba(0,0,0,.08); }
    .kv .row:last-child { border-bottom: 0; }
    .prewrap { white-space: pre-wrap; }
  </style>
</head>

<body class="bg-light">
  <div class="container py-4">

    <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between mb-3">
      <div>
        <h1 class="h3 mb-0">NPC Viewer</h1>
        <div class="text-secondary small" id="status">No cached data. Upload an Excel file to begin.</div>
      </div>

      <div class="d-flex flex-wrap gap-2 align-items-center">
        <label class="btn btn-primary mb-0">
          Upload Excel
          <input id="file" type="file" accept=".xlsx" hidden>
        </label>
        <button id="clear" class="btn btn-outline-secondary" type="button">Clear cache</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-4">
            <label class="form-label mb-1">Search</label>
            <input id="q" class="form-control" type="search" placeholder="Search name...">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label mb-1">Origin</label>
            <select id="origin" class="form-select"></select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label mb-1">Reputation</label>
            <select id="reputation" class="form-select"></select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label mb-1">Relation</label>
            <select id="relation" class="form-select"></select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label mb-1">Sort</label>
            <select id="sort" class="form-select"></select>
          </div>

          <div class="col-12 col-md-6 d-flex flex-wrap gap-3 pt-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="onlyRecruited">
              <label class="form-check-label" for="onlyRecruited">Only Recruited</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="hideDefeated" checked>
              <label class="form-check-label" for="hideDefeated">Hide Defeated</label>
            </div>
          </div>

          <div class="col-12 col-md-6 text-md-end text-secondary small pt-2">
            <span id="count">0 shown / 0 total</span>
          </div>
        </div>
      </div>
    </div>

    <!-- List -->
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <div class="fw-semibold">NPCs</div>
        <div class="text-secondary small">Tap/click a row for details</div>
      </div>
      <div class="list-group list-group-flush" id="list"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="npcModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title mb-0" id="modalTitle">NPC</h5>
            <div class="text-secondary small" id="modalSubtitle"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <!-- left: data -->
            <div class="col-12 col-lg-8">
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Identity</div>
                    <div class="card-body kv" id="kvIdentity"></div>
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Social</div>
                    <div class="card-body kv" id="kvSocial"></div>
                  </div>
                </div>

                <div class="col-12">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Stats</div>
                    <div class="card-body kv" id="kvStats"></div>
                  </div>
                </div>

                <div class="col-12">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Gear & Abilities</div>
                    <div class="card-body kv" id="kvGear"></div>
                  </div>
                </div>

                <div class="col-12">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Skills</div>
                    <div class="card-body prewrap" id="skillsBox"></div>
                  </div>
                </div>

                <div class="col-12">
                  <div class="card">
                    <div class="card-header bg-white fw-semibold">Description</div>
                    <div class="card-body prewrap" id="descBox"></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- right: image -->
            <div class="col-12 col-lg-4">
              <img id="modalImg" class="modal-img" alt="">
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <div class="text-secondary small me-auto" id="modalFooter"></div>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS (for modal) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- App -->
  <script type="module" src="./app.js"></script>
</body>
</html>
